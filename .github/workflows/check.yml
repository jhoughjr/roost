name: check
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax
        run: for f in bin/*.sh bin/roost; do bash -n "$f"; done
      - name: shellcheck
        run: shellcheck -S warning bin/*.sh bin/roost || true
      - name: python compile
        run: python3 -m py_compile bin/*.py
      - name: python tests
        run: python3 -m unittest discover -s tests -v
