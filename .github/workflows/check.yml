name: check
on: [push, pull_request]
jobs:
  lint:
    # Match the labels shared by opi-roost (Linux) and mini-roost (macOS) so
    # either can run the job — whichever is up. Keeps the mini as failover if
    # opi is offline (and vice-versa). Steps are OS-agnostic (bash/python3).
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax
        run: for f in bin/*.sh bin/roost; do bash -n "$f"; done
      - name: shellcheck
        run: shellcheck -S warning bin/*.sh bin/roost || true
      - name: python compile
        run: python3 -m py_compile bin/*.py
      - name: python tests
        run: python3 -m unittest discover -s tests -v
